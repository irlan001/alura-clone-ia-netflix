<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <main>
        <header>
            <h1>Quem está assistindo</h1>
            <button id="theme-toggle" aria-label="Alternar tema">☀️</button>
        </header>
        <section class="perfis">
            <ul class="container">
                <li class="perfil">
                    <a href="catalogo/Catalogo.html" data-name="Gustavo" data-img="../../Assets/Foto-perfil1.png">
                        <img src="Assets/Foto-perfil1.png" alt="Imagen de perfil de uma raposa">
                        <p>Gustavo</p>
                    </a>
                </li>
                <li class="perfil">
                    <a href="catalogo/Catalogo.html" data-name="Maria" data-img="../../Assets/Foto-perfil2.png">
                        <img src="Assets/Foto-perfil2.png" alt="Imagen de perfil de uma gata branca">
                        <p>Maria</p>
                    </a>
                </li>
                <li class="perfil">
                    <a href="catalogo/Catalogo.html" data-name="João" data-img="../../Assets/Foto-perfil3.png">
                        <img src="Assets/Foto-perfil3.png" alt="Imagen de perfil de um urso pardo">
                        <p>João</p>
                    </a>
                </li>
            </ul>
        </section>
    </main>
    <script>
        document.querySelectorAll('.perfis .perfil a').forEach(function(link) {
            link.addEventListener('click', function() {
                var profile = {
                    name: this.dataset.name || this.querySelector('p').textContent,
                    image: this.dataset.img || this.querySelector('img').src
                };
                localStorage.setItem('selectedProfile', JSON.stringify(profile));
            });
        });
    </script>
    <script src="javascript/indexjv.js"></script>
</body>
</html>
